name: CI - Build and Test

on:
  push:
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        features:
        - -DENABLE_DEBUG=ON -DENABLE_MANPAGES=ON
        - -DENABLE_LIBNOTIFY=ON
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - name: Install Dependencies
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: >
          libcurl4-openssl-dev
          libnotify-dev
          python3-docutils
    - uses: actions/checkout@v6
    - name: Configure
      run: cmake -B build ${{ matrix.features }}
    - name: Build
      run: cmake --build build
    - name: Run Tests
      working-directory: build
      run: ctest -j8 --output-on-failure
